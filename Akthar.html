<body>
    <!DOCTYPE html>C
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akthar's Favorite Movies</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    text-align:center;
}

.box{
    width:950px;
    margin:30px auto;
    padding:20px;
    background:white;
    border:3px solid #000;
    border-radius:15px;
}

.movies{
    display:flex;
    justify-content:center;
    gap:20px;
}

.movie{
    width:280px;
}

.movie img{
    width:100%;
    height:400px;
    border-radius:10px;
    object-fit:cover;
}

p{
    font-size:14px;
}
</style>
</head>

<body>

<h1>I'm Akthar</h1>
<h2>These are my Favorite Movies</h2>

<div class="box">

    <div class="movies">

        <div class="movie">
            <!-- Leo Poster -->
            <img src="https://upload.wikimedia.org/wikipedia/en/7/7f/Leo_%282023_Indian_film%29.jpg" alt="Leo">
            <h3>Leo</h3>
            <p>
                Leo is one of my favorite action thriller movies starring Vijay.
            </p>
        </div>

        <div class="movie">
            <!-- Vikram Poster -->
            <img src="https://upload.wikimedia.org/wikipedia/en/9/93/Vikram_2022_poster.jpg" alt="Vikram">
            <h3>Vikram</h3>
            <p>
                Vikram is a blockbuster action movie starring Kamal Haasan.
            </p>
        </div>

        <div class="movie">
            <!-- Jailer Poster -->
            <img src="https://upload.wikimedia.org/wikipedia/en/c/cb/Jailer_2023_Tamil_film_poster.jpg" alt="Jailer">
            <h3>Jailer</h3>
            <p>
                Jailer is a super hit movie starring Rajinikanth.
            </p>
        </div>

    </div>

</div>

</body>
</html>
</body>
</html>
