<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Haneef Movies</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    min-height:100vh;
    background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)),
    url('https://images.unsplash.com/photo-1489599904472-afc3f6b0f6df');
    background-size: cover;
    background-position: center;
    color:white;
}

header{
    text-align:center;
    padding:50px 20px;
}

header h1{
    font-size:70px;
    background: linear-gradient(90deg,#FFD700,#ff6600);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

header p{
    margin-top:15px;
    font-size:24px;
    color:#ddd;
}

.container{
    display:flex;
    justify-content:center;
    gap:30px;
    flex-wrap:wrap;
    padding:40px;
}

.card{
    width:320px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 8px 25px rgba(0,0,0,0.5);
    transition:0.4s;
}

.card:hover{
    transform: translateY(-15px);
    box-shadow:0 15px 40px rgba(255,215,0,0.4);
}

.card img{
    width:100%;
    height:420px;
    object-fit:cover;
}

.card-content{
    padding:20px;
}

.card h2{
    font-size:38px;
    color:#FFD700;
    margin-bottom:10px;
}

.card p{
    font-size:20px;
    line-height:1.5;
    color:#ddd;
}
</style>
</head>
<body>

<header>
    <h1>I'm Haneef</h1>
    <p>My Favorite Tamil Movies</p>
</header>

<div class="container">

    <div class="card">
        <img src="images/leo.jpg" alt="Leo">
        <div class="card-content">
            <h2>Leo</h2>
            <p>Action thriller starring Vijay with stylish action scenes and powerful performance.</p>
        </div>
    </div>

    <div class="card">
        <img src="images/vikarm.jpg" alt="Vikram">
        <div class="card-content">
            <h2>Vikram</h2>
            <p>Kamal Haasan’s action blockbuster with thrilling screenplay and mass moments.</p>
        </div>
    </div>

    <div class="card">
        <img src="images/jailer.jpg"Jailer">
        <div class="card-content">
            <h2>Jailer</h2>
            <p>Rajinikanth’s mass entertainer packed with swag, action, and style.</p>
        </div>
    </div>

</div>

</body>
</html>
