<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My favorite page</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            text-align: center;
        }

        h1 {
            margin-top: 40px;
            font-size: 50px;
            color: white;
            background-color: black;
        }

        h2 {
            font-size: 35px;
            color: #444;
            margin-bottom: 40px;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            padding-bottom: 50px;
        }

        .card {
            background: white;
            width: 300px;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.2);
        }

        .card img {
            width: 100%;
            height: 350px;
            object-fit: cover;
            border-radius: 10px;
        }

        .card h3 {
            margin-top: 15px;
            font-size: 28px;
            color: #222;
        }

        .card p {
            font-size: 18px;
            color: #555;
        }
    </style>
</head>
<body>

    <h1>I'm Haneef, My Favorite Movies</h1>

    <div class="container">

        <div class="card">
            <img src="images/leo.jpg" alt="Leo Movie">
            <h3>Leo</h3>
            <p>Action thriller movie starring Vijay with mass action scenes.</p>
        </div>

        <div class="card">
            <img src="images/vikarm.jpg" alt="Vikram Movie">
            <h3>Vikram</h3>
            <p>Action-packed movie starring Kamal Haasan with powerful story.</p>
        </div>

        <div class="card">
            <img src="images/jailer.jpg" alt="Jailer Movie">
            <h3>Jailer</h3>
            <p>Superstar Rajinikanth mass entertainer with powerful performance.</p>
        </div>

    </div>

</body>
</html>
