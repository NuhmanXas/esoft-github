<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Ashrif's Favorite Movies</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: white;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: gold;
        }

        .movies {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 30px;
        }

        .movie-card {
            background: #222;
            padding: 15px;
            border-radius: 10px;
            width: 250px;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }

        .movie-card img {
            width: 100%;
            border-radius: 10px;
        }

        .movie-card h2 {
            color: gold;
        }
    </style>
</head>

<body>

    <h1>🎬 Ashrif's Favorite Movies 🎬</h1>
    <p>These are my favorite movies of all time.</p>

    <div class="movies">

        <div class="movie-card">
            <img src="https://image.tmdb.org/t/p/w500/gEU2QniE6E77NI6lCU6MxlNBvIx.jpg" width="300">
            <h2>Interstellar</h2>
            <p>A sci-fi masterpiece about space, time, and love.</p>
        </div>

        <div class="movie-card">
            <img src="https://m.media-amazon.com/images/I/81p+xe8cbnL.jpg" alt="The Dark Knight">
            <h2>The Dark Knight</h2>
            <p>One of the greatest superhero movies ever made.</p>
        </div>

        <div class="movie-card">
            <img src="https://image.tmdb.org/t/p/w500/or06FN3Dka5tukK1e9sl16pB3iy.jpg" width="300">
            <h2>Avengers: Endgame</h2>
            <p>The epic conclusion to the Infinity Saga.</p>
        </div>

    </div>

</body>

</html>
